name: Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-22.04
    env:
      RUSTFLAGS: -C target-cpu=x86-64-v3
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: "ubuntu-22.04", platform: "linux", arch: "x64", variants: "baseline modern" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache native addon
        id: addon-cache
        uses: actions/cache@v4
        with:
          path: packages/natives/native/arcane_natives.${{ matrix.platform }}-${{ matrix.arch }}*.node
          key: native-${{ matrix.platform }}-${{ matrix.arch }}-ci-${{ hashFiles('crates/**', 'Cargo.toml', 'Cargo.lock', 'packages/natives/scripts/**') }}
      - uses: dtolnay/rust-toolchain@nightly
        if: steps.addon-cache.outputs.cache-hit != 'true'
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        if: steps.addon-cache.outputs.cache-hit != 'true'
        with:
          key: ${{ matrix.target }}
      - uses: oven-sh/setup-bun@v2
        if: steps.addon-cache.outputs.cache-hit != 'true'
        with:
          bun-version: "1.3"
      - name: Install cross-compilation toolchain
        if: steps.addon-cache.outputs.cache-hit != 'true' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build native addon(s)
        if: steps.addon-cache.outputs.cache-hit != 'true'
        env:
          CROSS_TARGET: ${{ matrix.target }}
          TARGET_PLATFORM: ${{ matrix.platform }}
          TARGET_ARCH: ${{ matrix.arch }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_PROFILE: ci
        shell: bash
        run: |
          VARIANTS="${{ matrix.variants }}"
          if [ -z "$VARIANTS" ]; then
            bun --cwd=packages/natives run build:native
          else
            for variant in $VARIANTS; do
              case "$variant" in
                baseline) export RUSTFLAGS="-C target-cpu=x86-64-v2" ;;
                modern)   export RUSTFLAGS="-C target-cpu=x86-64-v3" ;;
              esac
              export TARGET_VARIANT="$variant"
              bun --cwd=packages/natives run build:native
            done
          fi
      - name: Upload native addon(s)
        uses: actions/upload-artifact@v4
        with:
          name: arcane-natives-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/natives/native/arcane_natives.${{ matrix.platform }}-${{ matrix.arch }}*.node
          if-no-files-found: error

  test:
    needs: [native]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep imagemagick
          sudo ln -s $(which fdfind) /usr/local/bin/fd
          sudo ln -sf /usr/bin/convert /usr/local/bin/magick
      - run: bun install --frozen-lockfile
      - name: Download native addon
        uses: actions/download-artifact@v4
        with:
          name: arcane-natives-linux-x64
          path: packages/natives/native/
      - run: bun run generate-docs-index
      - run: bun --cwd=packages/coding-agent run generate-template
      - run: bun run check
      - run: bun run test
      - name: CLI smoke test
        run: |
          bun packages/coding-agent/src/cli.ts --version
          bun packages/coding-agent/src/cli.ts --help
          bun packages/coding-agent/src/cli.ts stats --help
      - name: Install method smoke tests
        run: bash scripts/install-tests/run-ci.sh
