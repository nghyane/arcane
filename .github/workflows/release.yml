name: Release

on:
  push:
    tags: ["release/*"]
  workflow_dispatch:
    inputs:
      skip_npm:
        description: "Skip npm publish"
        type: boolean
        default: false
      skip_binaries:
        description: "Skip binary build and GitHub Release"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      natives_changed: ${{ steps.check.outputs.natives_changed }}
      native_hash: ${{ steps.hash.outputs.native_hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute native source hash
        id: hash
        run: echo "native_hash=${{ hashFiles('crates/**', 'Cargo.toml', 'Cargo.lock', 'packages/natives/scripts/**') }}" >> "$GITHUB_OUTPUT"
      - name: Check if native code changed
        id: check
        run: |
          PREV_TAG=$(git tag --sort=-v:refname --list 'release/*' | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            echo "natives_changed=true" >> "$GITHUB_OUTPUT"
            echo "No previous release tag found, building natives"
            exit 0
          fi
          echo "Comparing against $PREV_TAG"
          if git diff --quiet "$PREV_TAG" -- crates/ Cargo.toml Cargo.lock packages/natives/scripts/; then
            echo "natives_changed=false" >> "$GITHUB_OUTPUT"
            echo "Native code unchanged"
          else
            echo "natives_changed=true" >> "$GITHUB_OUTPUT"
            echo "Native code changed"
          fi

  native:
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.natives_changed == 'true' && (!inputs.skip_npm || !inputs.skip_binaries) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: "ubuntu-22.04", platform: "linux", arch: "x64", variants: "baseline modern" }
          - { os: "ubuntu-22.04", platform: "linux", arch: "arm64", target: "aarch64-unknown-linux-gnu" }
          - { os: "macos-15-intel", platform: "darwin", arch: "x64", variants: "baseline modern" }
          - { os: "macos-14", platform: "darwin", arch: "arm64" }
          - { os: "windows-latest", platform: "win32", arch: "x64", variants: "baseline modern" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache native addon
        id: addon-cache
        uses: actions/cache@v4
        with:
          path: packages/natives/native/arcane_natives.${{ matrix.platform }}-${{ matrix.arch }}*.node
          key: native-${{ matrix.platform }}-${{ matrix.arch }}-release-${{ hashFiles('crates/**', 'Cargo.toml', 'Cargo.lock', 'packages/natives/scripts/**') }}
      - uses: dtolnay/rust-toolchain@nightly
        if: steps.addon-cache.outputs.cache-hit != 'true'
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        if: steps.addon-cache.outputs.cache-hit != 'true'
        with:
          key: ${{ matrix.target }}
      - uses: oven-sh/setup-bun@v2
        if: steps.addon-cache.outputs.cache-hit != 'true'
        with:
          bun-version: "1.3"
      - name: Install cross-compilation toolchain
        if: steps.addon-cache.outputs.cache-hit != 'true' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build native addon(s)
        if: steps.addon-cache.outputs.cache-hit != 'true'
        env:
          CROSS_TARGET: ${{ matrix.target }}
          TARGET_PLATFORM: ${{ matrix.platform }}
          TARGET_ARCH: ${{ matrix.arch }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_PROFILE: release
        shell: bash
        run: |
          VARIANTS="${{ matrix.variants }}"
          if [ -z "$VARIANTS" ]; then
            bun --cwd=packages/natives run build:native
          else
            for variant in $VARIANTS; do
              case "$variant" in
                baseline) export RUSTFLAGS="-C target-cpu=x86-64-v2" ;;
                modern)   export RUSTFLAGS="-C target-cpu=x86-64-v3" ;;
              esac
              export TARGET_VARIANT="$variant"
              bun --cwd=packages/natives run build:native
            done
          fi
      - name: Upload native addon(s)
        uses: actions/upload-artifact@v4
        with:
          name: arcane-natives-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/natives/native/arcane_natives.${{ matrix.platform }}-${{ matrix.arch }}*.node
          if-no-files-found: error

  publish:
    needs: [detect-changes, native]
    if: ${{ !inputs.skip_npm && !cancelled() && (needs.native.result == 'success' || needs.native.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: Download native addons (from build)
        if: ${{ needs.native.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          pattern: arcane-natives-*
          path: packages/natives/native
          merge-multiple: true
      - name: Download native addons from latest release
        if: ${{ needs.native.result == 'skipped' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p packages/natives/native
          LATEST=$(gh release list --limit 20 --json tagName --jq '.[].tagName' | while read -r tag; do if gh release view "$tag" --json assets --jq '.assets[].name' 2>/dev/null | grep -q '\.node$'; then echo "$tag"; break; fi; done)
          if [ -z "$LATEST" ]; then
            echo "::error::No previous release with native addons found"
            exit 1
          fi
          echo "Downloading native addons from release $LATEST"
          gh release download "$LATEST" --pattern "*.node" --dir packages/natives/native/
          ls -la packages/natives/native/
      - name: Publish to npm
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_CONFIG_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi
          FAILED=0
          for pkg in packages/*/; do
            if jq -e '.private == true' "$pkg/package.json" > /dev/null 2>&1; then
              continue
            fi
            PKG_NAME=$(jq -r .name "$pkg/package.json")
            PKG_VERSION=$(jq -r .version "$pkg/package.json")
            echo "Publishing $PKG_NAME@$PKG_VERSION..."
            (cd "$pkg" && bun publish --access public --tolerate-republish) || FAILED=1
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi

  binaries:
    needs: [detect-changes, native]
    if: ${{ !inputs.skip_binaries && !cancelled() && (needs.native.result == 'success' || needs.native.result == 'skipped') }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: Download native addons (from build)
        if: ${{ needs.native.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          pattern: arcane-natives-*
          path: packages/natives/native
          merge-multiple: true
      - name: Download native addons from latest release
        if: ${{ needs.native.result == 'skipped' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p packages/natives/native
          LATEST=$(gh release list --limit 20 --json tagName --jq '.[].tagName' | while read -r tag; do if gh release view "$tag" --json assets --jq '.assets[].name' 2>/dev/null | grep -q '\.node$'; then echo "$tag"; break; fi; done)
          if [ -z "$LATEST" ]; then
            echo "::error::No previous release with native addons found"
            exit 1
          fi
          echo "Downloading native addons from release $LATEST"
          gh release download "$LATEST" --pattern "*.node" --dir packages/natives/native/
          ls -la packages/natives/native/
      - name: Verify native addons
        run: |
          echo "Native addons downloaded:"
          ls -la packages/natives/native/
          echo ""
          for plat in linux-x64-modern linux-x64-baseline linux-arm64 darwin-x64-modern darwin-x64-baseline darwin-arm64 win32-x64-modern win32-x64-baseline; do
            if [ -f "packages/natives/native/arcane_natives.${plat}.node" ]; then
              echo "ok arcane_natives.${plat}.node"
            else
              echo "MISSING arcane_natives.${plat}.node"
              exit 1
            fi
          done
      - name: Build binaries
        run: |
          bun --cwd=packages/stats scripts/generate-client-bundle.ts
          bun run generate-docs-index
          bun --cwd=packages/coding-agent run generate-template
          mkdir -p packages/coding-agent/binaries
          ENTRYPOINT="./packages/coding-agent/src/cli.ts"
          DEFINES="--define PI_COMPILED=true --root ."
          build_binary() {
            PLATFORM="$1"
            ARCH="$2"
            TARGET="$3"
            OUTFILE="$4"
            TARGET_PLATFORM="$PLATFORM" TARGET_ARCH="$ARCH" bun --cwd=packages/natives run embed:native
            bun build --compile $DEFINES --target="$TARGET" "$ENTRYPOINT" --outfile "$OUTFILE"
          }
          build_binary darwin arm64 bun-darwin-arm64 packages/coding-agent/binaries/omp-darwin-arm64
          build_binary darwin x64 bun-darwin-x64 packages/coding-agent/binaries/omp-darwin-x64
          build_binary linux x64 bun-linux-x64-modern packages/coding-agent/binaries/omp-linux-x64
          build_binary linux arm64 bun-linux-arm64 packages/coding-agent/binaries/omp-linux-arm64
          build_binary win32 x64 bun-windows-x64-modern packages/coding-agent/binaries/omp-windows-x64.exe
          bun --cwd=packages/natives run embed:native --reset
          bun --cwd=packages/stats scripts/generate-client-bundle.ts --reset
      - name: Stage native addons for release
        run: cp packages/natives/native/*.node packages/coding-agent/binaries/
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          files: packages/coding-agent/binaries/*
          generate_release_notes: true
