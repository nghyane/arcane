name: Native Cache Warm

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "packages/natives/scripts/**"
  workflow_dispatch:

concurrency:
  group: native-cache
  cancel-in-progress: true

jobs:
  warm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: "ubuntu-22.04", platform: "linux", arch: "x64", variants: "baseline modern" }
          - { os: "ubuntu-22.04", platform: "linux", arch: "arm64", target: "aarch64-unknown-linux-gnu" }
          - { os: "macos-15-intel", platform: "darwin", arch: "x64", variants: "baseline modern" }
          - { os: "macos-14", platform: "darwin", arch: "arm64" }
          - { os: "windows-latest", platform: "win32", arch: "x64", variants: "baseline modern" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache native addon
        id: addon-cache
        uses: actions/cache@v4
        with:
          path: packages/natives/native/arcane_natives.${{ matrix.platform }}-${{ matrix.arch }}*.node
          key: native-${{ matrix.platform }}-${{ matrix.arch }}-release-${{ hashFiles('crates/**', 'Cargo.toml', 'Cargo.lock', 'packages/natives/scripts/**') }}
      - uses: dtolnay/rust-toolchain@nightly
        if: steps.addon-cache.outputs.cache-hit != 'true'
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        if: steps.addon-cache.outputs.cache-hit != 'true'
        with:
          key: ${{ matrix.target }}
      - uses: oven-sh/setup-bun@v2
        if: steps.addon-cache.outputs.cache-hit != 'true'
        with:
          bun-version: "1.3"
      - name: Install cross-compilation toolchain
        if: steps.addon-cache.outputs.cache-hit != 'true' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build native addon(s)
        if: steps.addon-cache.outputs.cache-hit != 'true'
        env:
          CROSS_TARGET: ${{ matrix.target }}
          TARGET_PLATFORM: ${{ matrix.platform }}
          TARGET_ARCH: ${{ matrix.arch }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_PROFILE: release
        shell: bash
        run: |
          VARIANTS="${{ matrix.variants }}"
          if [ -z "$VARIANTS" ]; then
            bun --cwd=packages/natives run build:native
          else
            for variant in $VARIANTS; do
              case "$variant" in
                baseline) export RUSTFLAGS="-C target-cpu=x86-64-v2" ;;
                modern)   export RUSTFLAGS="-C target-cpu=x86-64-v3" ;;
              esac
              export TARGET_VARIANT="$variant"
              bun --cwd=packages/natives run build:native
            done
          fi
